version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  default:
    name: b2b_network
